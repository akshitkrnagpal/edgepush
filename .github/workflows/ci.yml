name: CI

# Runs the four pre-push gates on every push to main and every PR.
# Matches what CONTRIBUTING.md tells contributors to run locally:
#   pnpm typecheck && pnpm lint && pnpm test && pnpm build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Version is read from packageManager in package.json.
        # Do NOT set `version:` here or pnpm/action-setup will error
        # with "Multiple versions of pnpm specified".

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
