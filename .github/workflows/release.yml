name: Release

# Publishes @edgepush/sdk and @edgepush/cli to npm whenever a tag like
# v0.1.0 is pushed. Both packages share a version and ship together.
#
# Auth: npm Trusted Publishers (OIDC). No NPM_TOKEN secret needed.
# Configure trusted publishing for each package on npmjs.com:
#   Package → Settings → Publishing access → Trusted Publishers
#   Repository:   akshitkrnagpal/edgepush
#   Workflow:     .github/workflows/release.yml
#   Environment:  (leave blank)
#
# Release flow:
#   pnpm release patch          # bumps both packages, commits, tags
#   git push origin main
#   git push origin v<version>  # triggers this workflow

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted Publishers landed in npm 11.5.1. Node 22 ships with 10.x.
      - name: Upgrade npm for Trusted Publisher support
        run: npm install -g npm@latest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SDK_VERSION=$(node -p "require('./packages/sdk/package.json').version")
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$TAG" != "$SDK_VERSION" ] || [ "$TAG" != "$CLI_VERSION" ]; then
            echo "Tag $TAG does not match sdk=$SDK_VERSION cli=$CLI_VERSION"
            exit 1
          fi

      - name: Build
        run: pnpm --filter @edgepush/sdk --filter @edgepush/cli build

      # pnpm publish rewrites workspace:* deps to the real version on the
      # fly and shells out to the npm CLI for the actual upload, so the
      # latest npm above is what handles the OIDC handshake.
      - name: Publish @edgepush/sdk
        run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/sdk

      - name: Publish @edgepush/cli
        run: pnpm publish --access public --no-git-checks --provenance
        working-directory: packages/cli
